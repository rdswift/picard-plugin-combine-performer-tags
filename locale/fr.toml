"qt.CombinePerformerTagsOptionsPage.section.display.label.start" = "Caractères de début"
"qt.CombinePerformerTagsOptionsPage.section.display.text" = "Pour chacune des sections, vous pouvez choisir les caractères de début, les caractères de séparation et les caractères de fin. Notez que les espaces en début ou en fin de ligne doivent être indiqués dans les paramètres et ne seront pas ajoutés automatiquement. Si aucun caractère de séparation n'est indiqué, les éléments d'une section seront automatiquement séparés par un seul espace."
