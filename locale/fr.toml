"qt.CombinePerformerTagsOptionsPage.section.includes.text" = "Cette option permet de déterminer si les attributs de performance spécifiés dans la relation de performance doivent être inclus dans la sortie. Notez que l'affichage de ces attributs peut être activé ou désactivé séparément pour les instruments et les voix."
"qt.CombinePerformerTagsOptionsPage.section.includes.title" = "Inclure les attributs de performance"
"qt.CombinePerformerTagsOptionsPage.section.keywords.text" = "Ces paramètres déterminent le format des éléments contenus dans la variable. Le format est divisé en six parties : l'artiste ; l'instrument ou la voix ; et quatre sections sélectionnables par l'utilisateur pour les informations supplémentaires. La structure est la suivante :\n\nAvec regroupement par artiste :\n\n&nbsp;&nbsp;&nbsp; Artiste : <strong>[Section 1]</strong>Instrument/Voix<strong>[Section 2] [Section 3][Section 4]</strong>\n\nAvec regroupement par instrument/voix :\n\n&nbsp;&nbsp;&nbsp; <strong>[Section 1]</strong>Instrument/Voix<strong>[Section 2][Section 3]</strong>: Artiste<strong>[Section 4]</strong>\n\nVous pouvez sélectionner la section dans laquelle apparaissent les mots correspondant aux informations supplémentaires."
"qt.CombinePerformerTagsOptionsPage.section.keywords.title" = "Répartition des sections par mot-clé"
"qt.CombinePerformerTagsOptionsPage.section.label.additional" = "En outre :"
"qt.CombinePerformerTagsOptionsPage.section.label.guest" = "Invité :"
"qt.CombinePerformerTagsOptionsPage.section.label.solo" = "En solo :"
"qt.CombinePerformerTagsOptionsPage.section.label.vocal_types" = "Types de voix :"
"qt.CombinePerformerTagsOptionsPage.section.standard_or_credited.text" = "Ces options déterminent si les informations s'affichent en mode **crédité** ou **standard**. Si le mode « crédité » est sélectionné pour l'un des types d'informations et qu'aucune valeur créditée n'est disponible, ce sont les informations standard qui seront utilisées."
"qt.CombinePerformerTagsOptionsPage.section.standard_or_credited.title" = "Informations standard ou certifiées"
